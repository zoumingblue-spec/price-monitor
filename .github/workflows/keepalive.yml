name: Keep Alive

on:
  schedule:
    - cron: '0 4 1 * *'   # 每月1号 UTC 04:00 执行
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Touch keepalive file
        run: |
          date -u > .keepalive
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .keepalive
          git diff --cached --quiet || git commit -m "keepalive $(date -u +%Y-%m)"
          git push
